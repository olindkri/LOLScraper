<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Safari pinned tab: monochrome silhouette, Safari overrides fill color.
    Using fill-rule="evenodd" so overlapping regions become holes (eyes, nostrils).
  -->
  <g fill="#000000" fill-rule="evenodd">
    <!-- Left ear -->
    <ellipse cx="18" cy="38" rx="10" ry="13"/>
    <!-- Right ear -->
    <ellipse cx="82" cy="38" rx="10" ry="13"/>
    <!-- Head -->
    <circle cx="50" cy="54" r="34"/>
    <!-- Eyes punch out (overlap = transparent via evenodd) -->
    <circle cx="39" cy="47" r="5.5"/>
    <circle cx="61" cy="47" r="5.5"/>
    <!-- Snout region -->
    <ellipse cx="50" cy="65" rx="20" ry="13"/>
    <!-- Snout inner (overlap = transparent, creates nostril band) -->
    <ellipse cx="50" cy="65" rx="13" ry="7"/>
    <!-- Nostril punches back in (3rd overlap = filled again) -->
    <circle cx="43" cy="66" r="4"/>
    <circle cx="57" cy="66" r="4"/>
  </g>
</svg>
