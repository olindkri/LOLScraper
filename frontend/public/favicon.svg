<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Purple rounded square background -->
  <rect width="100" height="100" rx="18" fill="#7c3aed"/>

  <!-- Left ear -->
  <ellipse cx="18" cy="38" rx="10" ry="13" fill="#e2e8f0"/>
  <!-- Right ear -->
  <ellipse cx="82" cy="38" rx="10" ry="13" fill="#e2e8f0"/>

  <!-- Head -->
  <circle cx="50" cy="54" r="34" fill="#e2e8f0"/>

  <!-- Left eye -->
  <circle cx="39" cy="47" r="5.5" fill="#7c3aed"/>
  <!-- Right eye -->
  <circle cx="61" cy="47" r="5.5" fill="#7c3aed"/>

  <!-- Snout -->
  <ellipse cx="50" cy="65" rx="20" ry="13" fill="#7c3aed"/>

  <!-- Left nostril -->
  <circle cx="43" cy="66" r="4" fill="#e2e8f0"/>
  <!-- Right nostril -->
  <circle cx="57" cy="66" r="4" fill="#e2e8f0"/>
</svg>
